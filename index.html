  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

serif;font-size:19px;line-height:1.65;color:#DCCEB4;margin:0;\">\n          Every other Indian truck in Western Sydney runs a menu that tries to do everything. We picked one thing — eggs — and chased it all the way back to Surat. The result is a lineup you won't find anywhere else in Sydney: Surti Gujarati technique, pan-Indian flavour, and a little Aussie fusion swagger, built entirely from the humble egg. <em style=\"color:#E7D9C4;font-style:italic;\">(Ask us for the real founding story next time you're at the window — it's a good one.)<\u002Fem>\n        <\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div style=\"border-left:3px solid {{ yolk }};padding-left:16px;\">\n            <div style=\"font-family:'Anton',sans-serif;font-size:32px;color:#FBF1E0;\">4.7★<\u002Fdiv>\n            <div style=\"font-family:'Work Sans',sans-serif;font-size:13px;color:#bfae90;text-transform:uppercase;letter-spacing:1px;\">78 Google reviews<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:3px solid {{ chili }};padding-left:16px;\">\n            <div style=\"font-family:'Anton',sans-serif;font-size:32px;color:#FBF1E0;\">100%<\u002Fdiv>\n            <div style=\"font-family:'Work Sans',sans-serif;font-size:13px;color:#bfae90;text-transform:uppercase;letter-spacing:1px;\">Egg-only menu<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:3px solid {{ yolk }};padding-left:16px;\">\n            <div style=\"font-family:'Anton',sans-serif;font-size:32px;color:#FBF1E0;\">Nights<\u002Fdiv>\n            <div style=\"font-family:'Work Sans',sans-serif;font-size:13px;color:#bfae90;text-transform:uppercase;letter-spacing:1px;\">only. That's when it's good.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MENU HIGHLIGHTS -->\n  <section data-screen-label=\"Menu Highlights\" ref=\"{{ menuRef }}\" style=\"background:#201509;padding:110px 24px;\"> n\n      <sc-if value=\"{{ showStarters }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:80px;\">\n          <div style=\"text-align:center;margin-bottom:36px;\">\n            <span style=\"font-family:'Work Sans',sans-serif;font-size:13px;letter-spacing:2px;color:{{ chili }};text-transform:uppercase;font-weight:700;\">Also On The Menu<\u002Fspan>\n            <h3 style=\"font-family:'Anton',sans-serif;font-size:clamp(24px,3.6vw,32px);color:#FBF1E0;text-transform:uppercase;margin:10px 0 0;\">Starters &amp; Sides<\u002Fh3>\n          <\u002Fdiv>\n          <div style=\"max-width:720px;margin:0 auto;display:flex;flex-direction:column;\">\n            <sc-for list=\"{{ starterDishes }}\" as=\"s\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:16px 4px;border-bottom:1px solid rgba(255,255,255,0.08);\">\n                <div>\n                  <span style=\"font-family:'Work Sans',sans-serif;font-weight:600;font-size:16px;color:#FBF1E0;\">{{ s.name }}<\u002Fspan>\n                  <sc-if value=\"{{ s.tag }}\">\n                    <span style=\"font-family:'Work Sans',sans-serif;font-size:11px;color:{{ chili }};margin-left:8px;text-transform:uppercase;letter-spacing:0.5px;\">{{ s.tag }}<\u002Fspan>\n                  <\u002Fsc-if>\n                  <div style=\"font-family:'Work Sans',sans-serif;font-size:13px;color:#bfae90;margin-top:2px;\">{{ s.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-family:'Work Sans',sans-serif;font-weight:700;font-size:15px;color:{{ yolk }};white-space:nowrap;\">{{ s.price }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"text-align:center;font-family:'Work Sans',sans-serif;font-size:13px;color:#a3906f;margin-top:28px;font-style:italic;\">Full menu (Gravy Delights, Breads, Drinks) on Uber Eats — updated more often than we can keep this page in sync.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- GALLERY -->\n  <section data-screen-label=\"Gallery\" ref=\"{{ galleryRef }}\" style=\"background:#2c2015;padding:110px 24px;\">\n    <div style=\"{{ galleryReveal }}max-width:1180px;margin:0 auto;\">\n      <div style=\"text-align:center;margin-bottom:48px;\">\n        <span style=\"font-family:'Work Sans',sans-serif;font-size:13px;letter-spacing:2px;color:{{ yolk }};text-transform:uppercase;font-weight:700;\">From The Truck<\u002Fspan>\n        <h2 style=\"font-family:'Anton',sans-serif;font-size:clamp(30px,5vw,48px);color:#FBF1E0;text-transform:uppercase;margin:14px 0 0;\">A Taste, Before The Taste<\u002Fh2>\n        <p style=\"font-family:'Work Sans',sans-serif;color:#bfae90;font-size:14px;margin-top:10px;\">Real truck &amp; dish photography drops in here — this is the layout, waiting for your shots.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"{{ galleryGridStyle }}gap:14px;\">\n        <sc-for list=\"{{ galleryTiles }}\" as=\"tile\" hint-placeholder-count=\"6\">\n          <div style=\"grid-row:span {{ tile.span }};position:relative;border-radius:16px;overflow:hidden;background:{{ tile.bg }};display:flex;align-items:flex-end;padding:16px;\">\n            <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.55) 100%);\"><\u002Fdiv>\n            <span style=\"position:relative;font-family:'Work Sans',sans-serif;font-weight:600;font-size:13px;color:rgba(255,255,255,0.85);letter-spacing:0.3px;\">{{ tile.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LOCATION & HOURS -->\n  <section data-screen-label=\"Location and Hours\" id=\"location\" ref=\"{{ locationRef }}\" style=\"background:#201509;padding:110px 24px;\">\n    <div style=\"{{ locationReveal }}max-width:1080px;margin:0 auto;\">\n      <div style=\"text-align:center;margin-bottom:48px;\">\n        <span style=\"font-family:'Work Sans',sans-serif;font-size:13px;letter-spacing:2px;color:{{ chili }};text-transform:uppercase;font-weight:700;\">Find Us Tonight<\u002Fspan>\n        <h2 style=\"font-family:'Anton',sans-serif;font-size:clamp(30px,5vw,48px);color:#FBF1E0;text-transform:uppercase;margin:14px 0 0;\">Look For The Egglicious Truck<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"{{ locationGridStyle }}gap:28px;\">\n        <div style=\"display:flex;flex-direction:column;gap:24px;\">\n          <div style=\"background:linear-gradient(155deg,#33261a,#2c2015);border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:28px;\">\n            <div style=\"font-family:'Work Sans',sans-serif;font-size:12px;letter-spacing:1.5px;color:{{ yolk }};text-transform:uppercase;font-weight:700;margin-bottom:10px;\">Address<\u002Fdiv>\n            <p style=\"font-family:'Work Sans',sans-serif;font-size:18px;color:#FBF1E0;margin:0 0 12px;font-weight:600;\">133 Stephen St, Blacktown NSW 2148<\u002Fp>\n            <p style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:#DCCEB4;line-height:1.5;margin:0;\">We share this food truck park with a couple of other trucks (Tangy Chilli, New India) — we're not a shopfront, so look for the Egglicious truck itself, not a storefront number.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:linear-gradient(155deg,#33261a,#2c2015);border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:28px;\">\n            <div style=\"font-family:'Work Sans',sans-serif;font-size:12px;letter-spacing:1.5px;color:{{ yolk }};text-transform:uppercase;font-weight:700;margin-bottom:14px;\">Hours — Evenings Only<\u002Fdiv>\n            <sc-for list=\"{{ hours }}\" as=\"h\" hint-placeholder-count=\"7\">\n              <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);\">\n                <span style=\"font-family:'Work Sans',sans-serif;font-size:15px;color:{{ h.closed }};font-weight:600;\">{{ h.day }}<\u002Fspan>\n                <span style=\"font-family:'Work Sans',sans-serif;font-size:15px;color:{{ h.closed }};\">{{ h.time }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);min-height:420px;\">\n          <iframe title=\"Egglicious Sydney location map\" src=\"https://www.google.com/maps?q=133+Stephen+St,+Blacktown+NSW+2148,+Australia&amp;output=embed\" style=\"width:100%;height:100%;min-height:420px;border:0;filter:invert(0.92) hue-rotate(180deg) contrast(0.9);\"><\u002Fiframe>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ORDER NOW -->\n  <section data-screen-label=\"Order Now\" ref=\"{{ orderRef }}\" style=\"background:linear-gradient(155deg,#3a1608,#1a0f06);padding:110px 24px;text-align:center;\">\n    <div style=\"{{ orderReveal }}max-width:640px;margin:0 auto;\">\n      <h2 style=\"font-family:'Anton',sans-serif;font-size:clamp(32px,6vw,56px);color:#FBF1E0;text-transform:uppercase;margin:0 0 18px;line-height:1.05;\">Hungry Yet?<\u002Fh2>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:17px;color:#E7D9C4;margin:0 0 32px;\">No dine-in, no fuss — just hot eggs, straight to your door. Order through Uber Eats.<\u002Fp>\n      <a href=\"{{ uberEatsUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;background:{{ yolk }};color:#1a0f06;font-family:'Work Sans',sans-serif;font-weight:700;font-size:18px;padding:18px 40px;border-radius:999px;animation:pulseGlow 2.6s ease-in-out infinite;\">Order on Uber Eats<\u002Fa>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:#c9b8a0;margin-top:24px;\">Or call ahead: <a href=\"tel:+61485874263\" style=\"color:#FBF1E0;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.3);\">+61 485 874 263<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOLLOW US -->\n  <section data-screen-label=\"Follow Us\" ref=\"{{ followRef }}\" style=\"background:#2c2015;padding:110px 24px;\">\n    <div style=\"{{ followReveal }}max-width:1000px;margin:0 auto;text-align:center;\">\n      <span style=\"font-family:'Work Sans',sans-serif;font-size:13px;letter-spacing:2px;color:{{ chili }};text-transform:uppercase;font-weight:700;\">Follow The Yolk<\u002Fspan>\n      <h2 style=\"font-family:'Anton',sans-serif;font-size:clamp(30px,5vw,48px);color:#FBF1E0;text-transform:uppercase;margin:14px 0 28px;\">@{{ instagramHandle }}<\u002Fh2>\n      <div style=\"{{ igGridStyle }}gap:10px;max-width:720px;margin:0 auto 32px;\">\n        <sc-for list=\"{{ igTiles }}\" as=\"tile\" hint-placeholder-count=\"6\">\n          <div style=\"aspect-ratio:1;border-radius:10px;background:{{ tile.bg }};\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <a href=\"{{ instagramUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;background:transparent;border:2px solid {{ yolk }};color:#FBF1E0;font-family:'Work Sans',sans-serif;font-weight:700;font-size:15px;padding:14px 30px;border-radius:999px;\">Follow @{{ instagramHandle }}<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#201509;padding:48px 24px 32px;border-top:1px solid rgba(255,255,255,0.08);\">\n    <div style=\"max-width:1080px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:20px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <img src=\"107c1287-17b2-4cba-ab41-ebf72345852f\" alt=\"Egglicious Sydney logo\" style=\"width:26px;height:26px;border-radius:50%;object-fit:cover;\">\n        <span style=\"font-family:'Anton',sans-serif;font-size:15px;color:#FBF1E0;letter-spacing:0.3px;\">EGGLICIOUS SYDNEY<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:24px;flex-wrap:wrap;\">\n        <a href=\"tel:+61485874263\" style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:#cdbea3;text-decoration:none;\">+61 485 874 263<\u002Fa>\n        <a href=\"{{ instagramUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:#cdbea3;text-decoration:none;\">Instagram<\u002Fa>\n        <a href=\"{{ uberEatsUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:#cdbea3;text-decoration:none;\">Uber Eats<\u002Fa>\n      <\u002Fdiv>\n      <span style=\"font-family:'Work Sans',sans-serif;font-size:12px;color:#a3906f;\">133 Stephen St, Blacktown NSW 2148<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 480, &quot;height&quot;: 900}, &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#FFC22E&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#FFC22E&quot;, &quot;#F5A623&quot;, &quot;#FFD54A&quot;]}, &quot;chiliColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#FF4C29&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#FF4C29&quot;, &quot;#E4402B&quot;, &quot;#D62F1F&quot;]}, &quot;showStarters&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}, &quot;uberEatsUrl&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://www.ubereats.com/au/store/egglicious-sydney/n2RVASJCUK2feD5rKGhfIA&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;instagramHandle&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;egglicious_sydney&quot;, &quot;tsType&quot;: &quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      scrolled: false,\n      heroOffset: 0,\n      revealed: {},\n      isMobile: false\n    };\n    this.aboutRef = React.createRef();\n    this.menuRef = React.createRef();\n    this.galleryRef = React.createRef();\n    this.locationRef = React.createRef();\n    this.orderRef = React.createRef();\n    this.followRef = React.createRef();\n    this.onScroll = this.onScroll.bind(this);\n  }\n\n  componentDidMount() {\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n    this.onResize = () => this.setState({ isMobile: window.innerWidth <= 720 });\n    window.addEventListener('resize', this.onResize, { passive: true });\n    this.onResize();\n    const ids = ['about', 'menu', 'gallery', 'location', 'order', 'follow'];\n    const refs = [this.aboutRef, this.menuRef, this.galleryRef, this.locationRef, this.orderRef, this.followRef];\n    this.observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) {\n          const idx = refs.indexOf(entry.target);\n          if (idx !== -1) {\n            const key = ids[idx];\n            this.setState((s) => ({ revealed: { ...s.revealed, [key]: true } }));\n          }\n        }\n      });\n    }, { threshold: 0.15 });\n    refs.forEach((r) => { if (r.current) this.observer.observe(r.current); });\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.onScroll);\n    window.removeEventListener('resize', this.onResize);\n    if (this.observer) this.observer.disconnect();\n  }\n\n  onScroll() {\n    const y = window.scrollY || 0;\n    this.setState({ scrolled: y > 80, heroOffset: y * 0.15 });\n  }\n\n  reveal(key) {\n    const on = !!this.state.revealed[key];\n    return {\n      opacity: on ? 1 : 0,\n      transform: on ? 'translateY(0)' : 'translateY(36px)',\n      transition: 'opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.
